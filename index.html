const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const localDateStr = (date) => {
  const d = date instanceof Date ? date : new Date(date);
  const tzOffset = d.getTimezoneOffset() * 60000;
  return new Date(d.getTime() - tzOffset).toISOString().slice(0, 10);
};
const todayStr = () => localDateStr(new Date());
const fmtDate = (d) => new Date(d).toLocaleDateString("ko-KR", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });

function sellerTier(totalSales) {
  if (totalSales >= 50) return { name: "플래티넘", color: "#7C4DFF" };
  if (totalSales >= 20) return { name: "골드", color: "#FFB300" };
  if (totalSales >= 5) return { name: "실버", color: "#90A4AE" };
  return { name: "브론즈", color: "#B8794E" };
}

/* ---------------------------------------------------------------
   저장소 헬퍼
--------------------------------------------------------------- */
async function loadDB() {
  try {
    const r = await window.storage.get(DB_KEY, true);
    if (!r) throw new Error("empty");
    const parsed = JSON.parse(r.value);
    if (!parsed.users || !parsed.users.admin) {
      parsed.users = { ...(parsed.users || {}), admin: emptyDB().users.admin };
    }
    return parsed;
  } catch (e) {
    const fresh = emptyDB();
    try { await window.storage.set(DB_KEY, JSON.stringify(fresh), true); } catch (_) {}
    return fresh;
  }
}
async function persistDB(db) {
  try { await window.storage.set(DB_KEY, JSON.stringify(db), true); } catch (e) { console.error(e); }
}
async function saveFile(id, dataUrl) {
  try { await window.storage.set(`gg_file_${id}`, dataUrl, true); } catch (e) { console.error(e); }
}
async function loadFile(id) {
  try {
    const r = await window.storage.get(`gg_file_${id}`, true);
    return r ? r.value : null;
  } catch (e) { return null; }
}

/* ---------------------------------------------------------------
   작은 UI 컴포넌트
--------------------------------------------------------------- */
function Badge({ children, color }) {
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: 4, fontSize: 11, fontWeight: 700,
      padding: "2px 8px", borderRadius: 999, color: "#fff", background: color,
    }}>{children}</span>
  );
}
function PointTag({ price }) {
  if (price === 0) return <Badge color={COLORS.secondary}>무료</Badge>;
  return <Badge color={COLORS.primary}>{price.toLocaleString()}P</Badge>;
}
function Stars({ value, size = 14 }) {
  return (
    <span style={{ display: "inline-flex", gap: 1 }}>
      {[1, 2, 3, 4, 5].map((i) => (
        <Star key={i} size={size} fill={i <= Math.round(value) ? "#FFB300" : "none"} stroke="#FFB300" />
      ))}
    </span>
  );
}
function Modal({ title, onClose, children, width = 480 }) {
  return (
    <div style={{
      position: "fixed", inset: 0, background: "rgba(26,29,41,0.45)", zIndex: 100,
      display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
    }} onClick={onClose}>
      <div style={{
        background: COLORS.surface, borderRadius: 16, width: "100%", maxWidth: width,
        maxHeight: "88vh", overflowY: "auto", boxShadow: "0 20px 60px rgba(0,0,0,0.25)",
      }} onClick={(e) => e.stopPropagation()}>
        <div style={{
          display: "flex", alignItems: "center", justifyContent: "space-between",
          padding: "16px 20px", borderBottom: `1px solid ${COLORS.border}`, position: "sticky", top: 0, background: COLORS.surface, borderRadius: "16px 16px 0 0",
        }}>
          <h3 style={{ margin: 0, fontSize: 17, fontWeight: 800 }}>{title}</h3>
          <button onClick={onClose} className="gg-icon-btn"><X size={18} /></button>
        </div>
        <div style={{ padding: 20 }}>{children}</div>
      </div>
    </div>
  );
}
function Field({ label, children }) {
  return (
    <div style={{ marginBottom: 14 }}>
      <label style={{ display: "block", fontSize: 13, fontWeight: 700, marginBottom: 6, color: COLORS.text }}>{label}</label>
      {children}
    </div>
  );
}
function Toast({ msg, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2200); return () => clearTimeout(t); }, [msg]);
  if (!msg) return null;
  return (
    <div style={{
      position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", zIndex: 200,
      background: COLORS.text, color: "#fff", padding: "10px 18px", borderRadius: 999,
      fontSize: 13, fontWeight: 600, boxShadow: "0 8px 24px rgba(0,0,0,0.25)",
    }}>{msg}</div>
  );
}

/* ---------------------------------------------------------------
   메인 앱
--------------------------------------------------------------- */
function App() {
  const [db, setDb] = useState(null);
  const [me, setMe] = useState(null); // userId
  const [view, setView] = useState("home");
  const [authMode, setAuthMode] = useState("login");
  const [toast, setToast] = useState("");
  const [detailMaterial, setDetailMaterial] = useState(null);
  const [detailPost, setDetailPost] = useState(null);
  const [showUpload, setShowUpload] = useState(false);
  const [showPostForm, setShowPostForm] = useState(null); // board type
  const [showReport, setShowReport] = useState(null); // {type, id}
  const [searchQuery, setSearchQuery] = useState("");
  const [searchFilters, setSearchFilters] = useState({ subject: "", grade: "", school: "", free: false, sort: "popular" });
  const [freeCat, setFreeCat] = useState("전체");
  const dbRef = useRef(null);

  const notify = (m) => setToast(m);

  useEffect(() => {
    (async () => {
      const d = await loadDB();
      setDb(d); dbRef.current = d;
      const s = await (async () => { try { const r = await window.storage.get(SESSION_KEY, false); return r ? JSON.parse(r.value) : null; } catch (e) { return null; } })();
      if (s && d.users[s.userId] && !d.users[s.userId].banned) setMe(s.userId);
    })();
    const refresh = async () => {
      const fresh = await loadDB();
      dbRef.current = fresh;
      setDb(fresh);
    };
    const interval = setInterval(refresh, 3000);
    const onFocus = () => { if (document.visibilityState === "visible") refresh(); };
    document.addEventListener("visibilitychange", onFocus);
    window.addEventListener("focus", onFocus);
    return () => {
      clearInterval(interval);
      document.removeEventListener("visibilitychange", onFocus);
      window.removeEventListener("focus", onFocus);
    };
  }, []);

  useEffect(() => {
    if (db) { dbRef.current = db; }
  }, [db]);

  const mutate = useCallback(async (fn) => {
    // 저장 직전에 항상 최신 데이터를 다시 불러와 다른 사용자(관리자 포함)의
    // 변경사항을 덮어쓰지 않도록 한다.
    const fresh = await loadDB();
    fn(fresh);
    dbRef.current = fresh;
    setDb(fresh);
    await persistDB(fresh);
  }, []);

  const setSession = async (userId) => {
    const fresh = await loadDB();
    dbRef.current = fresh;
    setDb(fresh);
    setMe(userId);
    try { await window.storage.set(SESSION_KEY, JSON.stringify({ userId }), false); } catch (e) {}
  };
  const logout = async () => {
    setMe(null); setView("home");
    try { await window.storage.delete(SESSION_KEY, false); } catch (e) {}
  };

  if (!db) {
    return <div style={{ padding: 60, textAlign: "center", color: COLORS.muted, fontFamily: FONT }}>불러오는 중...</div>;
  }

  const user = me ? db.users[me] : null;
  const isAdmin = user && user.role === "admin";

  /* ---------- 포인트/알림 유틸 ---------- */
  const addPoints = (d, userId, amount, desc) => {
    const u = d.users[userId];
    if (!u) return;
    u.points += amount;
    d.pointHistory.push({ id: uid(), userId, type: amount >= 0 ? "적립" : "사용", amount, desc, date: new Date().toISOString() });
  };

  /* ---------- 인증 ---------- */
  const doSignup = async (form) => {
    if (!form.id || !form.pw || !form.nickname || !form.name) { notify("모든 항목을 입력해주세요."); return; }
    if (db.users[form.id]) { notify("이미 사용 중인 아이디입니다."); return; }
    if (Object.values(db.users).some((u) => u.nickname === form.nickname)) { notify("이미 사용 중인 닉네임입니다."); return; }
    await mutate((d) => {
      d.users[form.id] = {
        id: form.id, pw: form.pw, school: form.school, grade: form.grade, cls: form.cls,
        name: form.name, nickname: form.nickname, role: "user", points: 0, banned: false,
        joined: todayStr(), following: [], followers: [],
        attendance: { dates: [], streak: 0, lastDate: null },
        sellerStats: { today: 0, month: 0, total: 0, totalEarned: 0, lastResetDay: todayStr() },
      };
      addPoints(d, form.id, 1000, "회원가입 축하 포인트");
    });
    notify("가입 완료! 1000P가 지급되었습니다 🎁");
    await setSession(form.id);
    setView("home");
  };
  const doLogin = async (id, pw) => {
    const u = db.users[id];
    if (!u || u.pw !== pw) { notify("아이디 또는 비밀번호가 올바르지 않습니다."); return; }
    if (u.banned) { notify("정지된 계정입니다. 관리자에게 문의하세요."); return; }
    await setSession(id);
    setView("home");
    notify(`${u.nickname}님, 환영합니다!`);
  };

  /* ---------- 출석체크 ---------- */
  const doAttendance = async () => {
    if (!me) return;
    const t = todayStr();
    if (user.attendance.dates.includes(t)) { notify("오늘은 이미 출석했어요."); return; }
    await mutate((d) => {
      const u = d.users[me];
      const yest = localDateStr(new Date(Date.now() - 86400000));
      u.attendance.streak = u.attendance.lastDate === yest ? u.attendance.streak + 1 : 1;
      u.attendance.dates.push(t);
      u.attendance.lastDate = t;
      addPoints(d, me, 20, "출석 체크");
      if (u.attendance.streak === 7) addPoints(d, me, 100, "7일 연속 출석 보너스");
      if (u.attendance.streak === 30) addPoints(d, me, 500, "30일 연속 출석 보너스");
    });
    notify("출석 완료! +20P 🔥");
  };

  /* ---------- 자료 업로드/구매 ---------- */
  const doUpload = async (form, file) => {
    if (!form.title || !form.subject || !form.grade) { notify("필수 항목을 입력해주세요."); return; }
    const id = uid();
    if (file) {
      const dataUrl = await new Promise((res) => { const r = new FileReader(); r.onload = () => res(r.result); r.readAsDataURL(file); });
      await saveFile(id, dataUrl);
    }
    await mutate((d) => {
      d.materials.push({
        id, sellerId: me, title: form.title, desc: form.desc, subject: form.subject,
        grade: form.grade, price: Number(form.price) || 0, fileType: file ? file.type : "",
        hasFile: !!file, createdAt: new Date().toISOString(),
        purchasedBy: [], favoritedBy: [], reviews: [], questions: [], reports: [],
      });
    });
    setShowUpload(false);
    notify("자료가 등록되었습니다!");
  };
  const doDeleteMaterial = async (matId) => {
    await mutate((d) => { d.materials = d.materials.filter((m) => m.id !== matId); });
    setDetailMaterial(null);
    notify("자료를 삭제했습니다.");
  };
  const doPurchase = async (mat) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    if (mat.sellerId === me) { notify("본인 자료는 구매할 수 없어요."); return; }
    if (mat.purchasedBy.includes(me)) { notify("이미 구매한 자료예요."); return; }
    if (user.points < mat.price) { notify("포인트가 부족합니다."); return; }
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === mat.id);
      m.purchasedBy.push(me);
      const seller = d.users[m.sellerId];
      const t = todayStr();
      if (seller.sellerStats.lastResetDay !== t) { seller.sellerStats.today = 0; seller.sellerStats.lastResetDay = t; }
      seller.sellerStats.today += 1; seller.sellerStats.month += 1; seller.sellerStats.total += 1;
      seller.sellerStats.totalEarned += m.price;
      if (m.price > 0) {
        addPoints(d, me, -m.price, `자료 구매 - ${m.title}`);
        addPoints(d, m.sellerId, m.price, `자료 판매 - ${m.title}`);
      } else {
        d.pointHistory.push({ id: uid(), userId: me, type: "구매", amount: 0, desc: `무료 자료 다운로드 - ${m.title}`, date: new Date().toISOString() });
      }
    });
    notify("구매 완료! 마이페이지에서 확인하세요.");
  };
  const doFavorite = async (matId) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === matId);
      const i = m.favoritedBy.indexOf(me);
      if (i >= 0) m.favoritedBy.splice(i, 1); else m.favoritedBy.push(me);
    });
  };
  const doFollow = async (sellerId) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    if (sellerId === me) return;
    await mutate((d) => {
      const u = d.users[me]; const s = d.users[sellerId];
      const i = u.following.indexOf(sellerId);
      if (i >= 0) { u.following.splice(i, 1); s.followers = s.followers.filter((x) => x !== me); }
      else { u.following.push(sellerId); s.followers.push(me); }
    });
  };
  const doReview = async (matId, rating, text) => {
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === matId);
      m.reviews = m.reviews.filter((r) => r.userId !== me);
      m.reviews.push({ userId: me, rating, text, date: new Date().toISOString() });
    });
    notify("후기가 등록되었습니다.");
  };
  const doAsk = async (matId, text) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === matId);
      m.questions.push({ id: uid(), userId: me, text, answer: "", date: new Date().toISOString() });
    });
  };
  const doAnswer = async (matId, qid, answer) => {
    await mutate((d) => {
      const m = d.materials.find((x) => x.id === matId);
      const q = m.questions.find((x) => x.id === qid);
      q.answer = answer;
    });
  };

  /* ---------- 게시판 ---------- */
  const doCreatePost = async (board, form) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    if (!form.title || !form.content) { notify("제목과 내용을 입력해주세요."); return; }
    await mutate((d) => {
      const post = {
        id: uid(), board, category: form.category || "",
        authorId: me, title: form.title, content: form.content, comments: [], date: new Date().toISOString(), reports: [],
      };
      d.posts.push(post);
    });
    setShowPostForm(null);
    notify("게시글이 등록되었습니다.");
  };
  const doComment = async (postId, content) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    await mutate((d) => {
      const p = d.posts.find((x) => x.id === postId);
      p.comments.push({ id: uid(), authorId: me, content, date: new Date().toISOString() });
    });
  };
  const doDeletePost = async (postId) => {
    await mutate((d) => { d.posts = d.posts.filter((p) => p.id !== postId); });
    setDetailPost(null);
    notify("게시글을 삭제했습니다.");
  };

  /* ---------- 신고 ---------- */
  const doReport = async (target, reason) => {
    if (!me) { notify("로그인이 필요합니다."); return; }
    await mutate((d) => {
      d.reports.push({ id: uid(), type: target.type, targetId: target.id, reporterId: me, reason, date: new Date().toISOString(), status: "대기" });
    });
    setShowReport(null);
    notify("신고가 접수되었습니다.");
  };
  const resolveReport = async (rid, status) => {
    await mutate((d) => { d.reports.find((r) => r.id === rid).status = status; });
  };

  /* ---------- 관리자 ---------- */
  const adminBan = async (userId, banned) => {
    await mutate((d) => { d.users[userId].banned = banned; });
    notify(banned ? "계정을 정지했습니다." : "정지를 해제했습니다.");
  };
  const adminGrant = async (userId, amount, reason) => {
    if (!amount) return;
    await mutate((d) => { addPoints(d, userId, Number(amount), reason || "관리자 지급"); });
    notify("포인트를 지급했습니다.");
  };
  const adminAddNotice = async (title, content) => {
    await mutate((d) => { d.notices.unshift({ id: uid(), title, content, date: todayStr() }); });
    notify("공지를 등록했습니다.");
  };
  const adminDeleteNotice = async (id) => {
    await mutate((d) => { d.notices = d.notices.filter((n) => n.id !== id); });
  };

  /* ---------------------------------------------------------------
     렌더링
  --------------------------------------------------------------- */
  if (!me) {
    return (
      <Shell>
        <AuthScreen mode={authMode} setMode={setAuthMode} onLogin={doLogin} onSignup={doSignup} db={db} />
        <Toast msg={toast} onDone={() => setToast("")} />
      </Shell>
    );
  }

  return (
    <Shell>
      <TopBar
        user={user} isAdmin={isAdmin} view={view} setView={setView}
        onLogout={logout} onSearch={(q) => { setSearchQuery(q); setView("search"); }}
      />
      <div style={{ maxWidth: 1080, margin: "0 auto", padding: "20px 16px 80px" }}>
        {view === "home" && (
          <HomeView
            db={db} user={user} onAttend={doAttendance} onOpenMat={setDetailMaterial}
            setView={setView}
          />
        )}
        {view === "materials" && (
          <MaterialsView
            db={db} me={me} onOpenMat={setDetailMaterial} onUpload={() => setShowUpload(true)}
          />
        )}
        {view === "search" && (
          <SearchView db={db} query={searchQuery} setQuery={setSearchQuery}
            filters={searchFilters} setFilters={setSearchFilters} onOpenMat={setDetailMaterial} />
        )}
        {view === "free" && (
          <BoardView
            title="자유게시판" cats={["전체", ...FREE_CATS]} cat={freeCat} setCat={setFreeCat}
            posts={db.posts.filter((p) => p.board === "free" && (freeCat === "전체" || p.category === freeCat))}
            db={db} me={me} onOpen={setDetailPost} onNew={() => setShowPostForm("free")}
          />
        )}
        {view === "qna" && (
          <BoardView
            title="질문게시판" cats={null}
            posts={db.posts.filter((p) => p.board === "qna")}
            db={db} me={me} onOpen={setDetailPost} onNew={() => setShowPostForm("qna")}
          />
        )}
        {view === "notices" && <NoticesView db={db} />}
        {view === "points" && <PointsView db={db} user={user} />}
        {view === "mypage" && (
          <MyPage
            db={db} me={me} user={user} onOpenMat={setDetailMaterial} onOpenPost={setDetailPost}
            onDeleteMat={doDeleteMaterial} onAttend={doAttendance}
          />
        )}
        {view === "admin" && isAdmin && (
          <AdminView db={db} onBan={adminBan} onGrant={adminGrant}
            onAddNotice={adminAddNotice} onDeleteNotice={adminDeleteNotice}
            onDeleteMat={doDeleteMaterial} onDeletePost={doDeletePost} onResolveReport={resolveReport} />
        )}
      </div>

      {detailMaterial && (
        <MaterialModal
          mat={db.materials.find((m) => m.id === detailMaterial.id) || detailMaterial}
          db={db} me={me} isAdmin={isAdmin}
          onClose={() => setDetailMaterial(null)}
          onBuy={doPurchase} onFav={doFavorite} onFollow={doFollow}
          onReview={doReview} onAsk={doAsk} onAnswer={doAnswer}
          onDelete={doDeleteMaterial} onReport={() => setShowReport({ type: "자료", id: detailMaterial.id })}
        />
      )}
      {detailPost && (
        <PostModal
          post={db.posts.find((p) => p.id === detailPost.id) || detailPost}
          db={db} me={me} isAdmin={isAdmin}
          onClose={() => setDetailPost(null)} onComment={doComment}
          onDelete={doDeletePost} onReport={() => setShowReport({ type: "게시글", id: detailPost.id })}
        />
      )}
      {showUpload && (
        <UploadModal onClose={() => setShowUpload(false)} onSubmit={doUpload} />
      )}
      {showPostForm && (
        <PostFormModal board={showPostForm} db={db} user={user}
          onClose={() => setShowPostForm(null)} onSubmit={(f) => doCreatePost(showPostForm, f)} />
      )}
      {showReport && (
        <Modal title="신고하기" onClose={() => setShowReport(null)} width={360}>
          <p style={{ fontSize: 13, color: COLORS.muted, marginTop: 0 }}>신고 사유를 선택해주세요. 관리자가 확인 후 처리합니다.</p>
          {REPORT_REASONS.map((r) => (
            <button key={r} className="gg-btn-outline" style={{ width: "100%", marginBottom: 8, justifyContent: "flex-start" }}
              onClick={() => doReport(showReport, r)}>{r}</button>
          ))}
        </Modal>
      )}
      <Toast msg={toast} onDone={() => setToast("")} />
      <GlobalStyle />
    </Shell>
  );
}

/* ---------------------------------------------------------------
   검색
--------------------------------------------------------------- */
function SearchView({ db, query, setQuery, filters, setFilters, onOpenMat }) {
  let list = db.materials.filter((m) => {
    const q = query.trim().toLowerCase();
    if (q && !(m.title.toLowerCase().includes(q) || m.desc.toLowerCase().includes(q) || m.subject.includes(q))) return false;
    if (filters.subject && m.subject !== filters.subject) return false;
    if (filters.grade && m.grade !== filters.grade) return false;
    if (filters.free && m.price !== 0) return false;
    if (filters.school) { const s = db.users[m.sellerId]; if (!s || s.school !== filters.school) return false; }
    return true;
  });
  if (filters.sort === "popular") list.sort((a, b) => b.purchasedBy.length - a.purchasedBy.length);
  else list.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

  return (
    <div>
      <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0 }}>검색</h2>
      <div style={{ position: "relative", marginBottom: 14 }}>
        <Search size={16} style={{ position: "absolute", left: 14, top: 13, color: COLORS.muted }} />
        <input className="gg-input" style={{ paddingLeft: 38 }} value={query} onChange={(e) => setQuery(e.target.value)} placeholder="제목, 설명, 과목으로 검색" />
      </div>
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 18 }}>
        <select className="gg-input" style={{ width: "auto" }} value={filters.subject} onChange={(e) => setFilters({ ...filters, subject: e.target.value })}>
          <option value="">과목 전체</option>{SUBJECTS.map((s) => <option key={s}>{s}</option>)}
        </select>
        <select className="gg-input" style={{ width: "auto" }} value={filters.grade} onChange={(e) => setFilters({ ...filters, grade: e.target.value })}>
          <option value="">학년 전체</option>{GRADES.map((s) => <option key={s}>{s}</option>)}
        </select>
        <input className="gg-input" style={{ width: 140 }} placeholder="학교명" value={filters.school} onChange={(e) => setFilters({ ...filters, school: e.target.value })} />
        <label style={{ display: "flex", alignItems: "center", gap: 6, fontSize: 13, fontWeight: 600, padding: "0 6px" }}>
          <input type="checkbox" checked={filters.free} onChange={(e) => setFilters({ ...filters, free: e.target.checked })} /> 무료만
        </label>
        <select className="gg-input" style={{ width: "auto" }} value={filters.sort} onChange={(e) => setFilters({ ...filters, sort: e.target.value })}>
          <option value="popular">인기순</option><option value="recent">최신순</option>
        </select>
      </div>
      {list.length === 0 ? <EmptyState text="검색 결과가 없어요." /> : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(220px,1fr))", gap: 12 }}>
          {list.map((m) => <MaterialCard key={m.id} m={m} db={db} onClick={() => onOpenMat(m)} />)}
        </div>
      )}
    </div>
  );
}

  );
}

/* ---------------------------------------------------------------
   공지사항
--------------------------------------------------------------- */
function NoticesView({ db }) {
  const notices = [...db.notices].sort((a, b) => new Date(b.date) - new Date(a.date));
  return (
    <div>
      <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0, display: "flex", alignItems: "center", gap: 8 }}><Megaphone size={20} color={COLORS.primary} /> 공지사항</h2>
      {notices.length === 0 ? <EmptyState text="등록된 공지가 없어요." /> : (
        <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
          {notices.map((n) => (
            <div key={n.id} className="gg-card">
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 10 }}>
                <div style={{ fontWeight: 800, fontSize: 14.5 }}>{n.title}</div>
                <span style={{ fontSize: 11.5, color: COLORS.muted, whiteSpace: "nowrap" }}>{n.date}</span>
              </div>
              <div style={{ fontSize: 13.5, color: COLORS.text, marginTop: 6, lineHeight: 1.6, whiteSpace: "pre-wrap" }}>{n.content}</div>

      )}

}

/* ---------------------------------------------------------------
   포인트 기록
--------------------------------------------------------------- */
function PointsView({ db, user }) {
  const history = db.pointHistory.filter((h) => h.userId === user.id).sort((a, b) => new Date(b.date) - new Date(a.date));
  return (
    <div>
      <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0 }}>포인트 기록</h2>
      <div className="gg-card" style={{ background: `linear-gradient(135deg, ${COLORS.primary}, #6C7BFF)`, color: "#fff", border: "none", marginBottom: 16 }}>
        <div style={{ fontSize: 13, opacity: 0.9, fontWeight: 700 }}>현재 보유 포인트</div>
        <div style={{ fontSize: 28, fontWeight: 900, marginTop: 4 }}>{user.points.toLocaleString()}P</div>
      </div>
      {history.length === 0 ? <EmptyState text="포인트 내역이 없어요." /> : (
        <div className="gg-card" style={{ padding: 0, overflow: "hidden" }}>
          {history.map((h, i) => (
            <div key={h.id} style={{ padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: i < history.length - 1 ? `1px solid ${COLORS.border}` : "none" }}>

            </div>
          ))}
        </div>

/* ---------------------------------------------------------------
   마이페이지
--------------------------------------------------------------- */
function MyPage({ db, me, user, onOpenMat, onOpenPost, onDeleteMat, onAttend }) {
  const [tab, setTab] = useState("profile");
  const myMaterials = db.materials.filter((m) => m.sellerId === me);
  const purchased = db.materials.filter((m) => m.purchasedBy.includes(me));
  const favorites = db.materials.filter((m) => m.favoritedBy.includes(me));
  const following = user.following.map((id) => db.users[id]).filter(Boolean);
  const myPosts = db.posts.filter((p) => p.authorId === me);
  const myComments = [];
  db.posts.forEach((p) => p.comments.forEach((c) => { if (c.authorId === me) myComments.push({ ...c, postTitle: p.title, post: p }); }));
  const tier = sellerTier(user.sellerStats.total);
  const t = todayStr();
  const salesToday = user.sellerStats.lastResetDay === t ? user.sellerStats.today : 0;

  const tabs = [
    ["profile", "프로필"], ["sales", "판매자료·통계"], ["purchases", "구매자료"],
    ["favorites", "즐겨찾기"], ["following", "팔로우"], ["myposts", "내가 쓴 글"], ["mycomments", "내가 쓴 댓글"], ["attendance", "출석달력"],
  ];

  return (
    <div>
      <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0 }}>마이페이지</h2>
      <div style={{ display: "flex", gap: 6, marginBottom: 18, flexWrap: "wrap" }}>
        {tabs.map(([k, l]) => <button key={k} className={`gg-tab ${tab === k ? "active" : ""}`} onClick={() => setTab(k)}>{l}</button>)}
      </div>

      {tab === "profile" && (
        <div className="gg-card">
          <div style={{ display: "flex", alignItems: "center", gap: 14, marginBottom: 16 }}>
            <div style={{ width: 56, height: 56, borderRadius: "50%", background: COLORS.primary, color: "#fff", display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 900, fontSize: 22 }}>{user.nickname[0]}</div>
            <div>
              <div style={{ fontWeight: 900, fontSize: 17, display: "flex", alignItems: "center", gap: 6 }}>{user.nickname} <Badge color={tier.color}>{tier.name}</Badge></div>
              <div style={{ fontSize: 12.5, color: COLORS.muted }}>{user.school} · {user.grade} {user.cls}반</div>
            </div>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, fontSize: 13 }}>
            <div><span style={{ color: COLORS.muted }}>이름</span><div style={{ fontWeight: 700 }}>{user.name}</div></div>
            <div><span style={{ color: COLORS.muted }}>아이디</span><div style={{ fontWeight: 700 }}>{user.id}</div></div>
            <div><span style={{ color: COLORS.muted }}>가입일</span><div style={{ fontWeight: 700 }}>{user.joined}</div></div>
            <div><span style={{ color: COLORS.muted }}>보유 포인트</span><div style={{ fontWeight: 700, color: COLORS.primary }}>{user.points.toLocaleString()}P</div></div>
          </div>
        </div>
      )}

      {tab === "sales" && (
        <div>
          <div style={{ display: "grid", gridTemplateColumns: "repeat(4,1fr)", gap: 10, marginBottom: 18 }}>
            {[["오늘 판매", salesToday], ["이번 달", user.sellerStats.month], ["총 판매", user.sellerStats.total], ["총 획득P", user.sellerStats.totalEarned]].map(([l, v]) => (
              <div key={l} className="gg-card" style={{ textAlign: "center" }}>
                <div style={{ fontSize: 11.5, color: COLORS.muted, fontWeight: 700 }}>{l}</div>
                <div style={{ fontSize: 18, fontWeight: 900, marginTop: 4 }}>{v.toLocaleString()}</div>
              </div>
            ))}
          </div>
          {myMaterials.length === 0 ? <EmptyState text="등록한 자료가 없어요." /> : (
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 12 }}>
              {myMaterials.map((m) => (
                <div key={m.id} className="gg-card">
                  <div onClick={() => onOpenMat(m)} style={{ cursor: "pointer", fontWeight: 800, fontSize: 13.5, marginBottom: 6 }}>{m.title}</div>
                  <div style={{ fontSize: 12, color: COLORS.muted, marginBottom: 8 }}>구매 {m.purchasedBy.length}건 · <PointTag price={m.price} /></div>
                  <button className="gg-btn-outline" style={{ width: "100%", justifyContent: "center", color: COLORS.accent, fontSize: 12 }} onClick={() => { if (confirm("삭제할까요?")) onDeleteMat(m.id); }}><Trash2 size={12} /> 삭제</button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {tab === "purchases" && (purchased.length === 0 ? <EmptyState text="구매한 자료가 없어요." /> : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 12 }}>{purchased.map((m) => <MaterialCard key={m.id} m={m} db={db} onClick={() => onOpenMat(m)} />)}</div>
      ))}
      {tab === "favorites" && (favorites.length === 0 ? <EmptyState text="즐겨찾기한 자료가 없어요." /> : (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(200px,1fr))", gap: 12 }}>{favorites.map((m) => <MaterialCard key={m.id} m={m} db={db} onClick={() => onOpenMat(m)} />)}</div>
      ))}
      {tab === "following" && (following.length === 0 ? <EmptyState text="팔로우한 판매자가 없어요." /> : (
        <div className="gg-card" style={{ padding: 0 }}>
          {following.map((s, i) => (
            <div key={s.id} style={{ padding: "12px 16px", borderBottom: i < following.length - 1 ? `1px solid ${COLORS.border}` : "none", display: "flex", justifyContent: "space-between" }}>
              <span style={{ fontWeight: 700, fontSize: 13.5 }}>{s.nickname}</span>
              <Badge color={sellerTier(s.sellerStats.total).color}>{sellerTier(s.sellerStats.total).name}</Badge>
            </div>
          ))}
        </div>
      ))}
      {tab === "myposts" && (myPosts.length === 0 ? <EmptyState text="작성한 글이 없어요." /> : (
        <div className="gg-card" style={{ padding: 0 }}>
          {myPosts.map((p, i) => (
            <div key={p.id} onClick={() => onOpenPost(p)} style={{ padding: "12px 16px", cursor: "pointer", borderBottom: i < myPosts.length - 1 ? `1px solid ${COLORS.border}` : "none" }}>
              <div style={{ fontWeight: 700, fontSize: 13.5 }}>{p.title}</div>
              <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 3 }}>{p.board === "free" ? "자유게시판" : "질문게시판"} · {fmtDate(p.date)}</div>
            </div>
          ))}
        </div>
      ))}
      {tab === "mycomments" && (myComments.length === 0 ? <EmptyState text="작성한 댓글이 없어요." /> : (
        <div className="gg-card" style={{ padding: 0 }}>
          {myComments.map((c, i) => (
            <div key={c.id} onClick={() => onOpenPost(c.post)} style={{ padding: "12px 16px", cursor: "pointer", borderBottom: i < myComments.length - 1 ? `1px solid ${COLORS.border}` : "none" }}>
              <div style={{ fontSize: 13 }}>{c.content}</div>
              <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 3 }}>{c.postTitle}에 남긴 댓글 · {fmtDate(c.date)}</div>
            </div>
          ))}
        </div>
      ))}
      {tab === "attendance" && <AttendanceCalendar user={user} onAttend={onAttend} />}
    </div>
  );
}
function AttendanceCalendar({ user, onAttend }) {
  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const first = new Date(year, month, 1).getDay();
  const days = new Date(year, month + 1, 0).getDate();
  const checkedToday = user.attendance.dates.includes(todayStr());
  const cells = [];
  for (let i = 0; i < first; i++) cells.push(null);
  for (let d = 1; d <= days; d++) cells.push(d);
  return (
    <div className="gg-card">
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 14 }}>
        <div style={{ fontWeight: 800 }}>{year}년 {month + 1}월 · 🔥 연속 {user.attendance.streak}일</div>
        <button className="gg-btn gg-btn-secondary" disabled={checkedToday} onClick={onAttend}>{checkedToday ? "출석완료" : "출석 +20P"}</button>
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6, fontSize: 12, textAlign: "center", color: COLORS.muted, marginBottom: 6 }}>
        {["일", "월", "화", "수", "목", "금", "토"].map((d) => <div key={d}>{d}</div>)}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(7,1fr)", gap: 6 }}>
        {cells.map((d, i) => {
          const dateStr = d ? `${year}-${String(month + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}` : null;
          const checked = dateStr && user.attendance.dates.includes(dateStr);
          return (
            <div key={i} style={{
              aspectRatio: "1", display: "flex", alignItems: "center", justifyContent: "center", borderRadius: 8, fontSize: 12.5, fontWeight: 700,
              background: checked ? COLORS.secondary : "transparent", color: checked ? "#fff" : d ? COLORS.text : "transparent",
            }}>{d || ""}</div>
          );
        })}
      </div>
    </div>
  );
}

/* ---------------------------------------------------------------
   관리자 페이지
--------------------------------------------------------------- */
function AdminView({ db, onBan, onGrant, onAddNotice, onDeleteNotice, onDeleteMat, onDeletePost, onResolveReport }) {
  const [tab, setTab] = useState("users");
  const [grantAmt, setGrantAmt] = useState({});
  const [grantReason, setGrantReason] = useState({});
  const [noticeForm, setNoticeForm] = useState({ title: "", content: "" });
  const users = Object.values(db.users).filter((u) => u.role !== "admin");
  const tabs = [["users", "회원관리"], ["materials", "자료관리"], ["posts", "게시글관리"], ["notices", "공지관리"], ["reports", `신고관리 (${db.reports.filter((r) => r.status === "대기").length})`]];

  return (
    <div>
      <h2 style={{ fontSize: 19, fontWeight: 900, marginTop: 0, display: "flex", alignItems: "center", gap: 8 }}><Shield size={20} color={COLORS.primary} /> 관리자 페이지</h2>
      <div style={{ display: "flex", gap: 6, marginBottom: 18, flexWrap: "wrap" }}>
        {tabs.map(([k, l]) => <button key={k} className={`gg-tab ${tab === k ? "active" : ""}`} onClick={() => setTab(k)}>{l}</button>)}

        <div className="gg-card" style={{ padding: 0, overflow: "auto" }}>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 13 }}>
            <thead><tr style={{ background: COLORS.bg, textAlign: "left" }}>
              {["닉네임", "학교/학년", "포인트", "상태", "포인트 지급", "정지"].map((h) => <th key={h} style={{ padding: "10px 12px", fontWeight: 800 }}>{h}</th>)}
            </tr></thead>
            <tbody>
              {users.map((u) => (
                <tr key={u.id} style={{ borderTop: `1px solid ${COLORS.border}` }}>
                  <td style={{ padding: "10px 12px", fontWeight: 700 }}>{u.nickname} <span style={{ color: COLORS.muted, fontWeight: 400 }}>({u.name})</span></td>
                  <td style={{ padding: "10px 12px" }}>{u.school} {u.grade}</td>
                  <td style={{ padding: "10px 12px" }}>{u.points.toLocaleString()}P</td>
                  <td style={{ padding: "10px 12px" }}>{u.banned ? <Badge color={COLORS.accent}>정지됨</Badge> : <Badge color={COLORS.secondary}>정상</Badge>}</td>
                  <td style={{ padding: "10px 12px" }}>
                    <div style={{ display: "flex", gap: 4 }}>
                      <input className="gg-input" style={{ width: 70, padding: "6px 8px" }} placeholder="P" value={grantAmt[u.id] || ""} onChange={(e) => setGrantAmt({ ...grantAmt, [u.id]: e.target.value })} />
                      <button className="gg-btn" style={{ padding: "6px 10px", fontSize: 12 }} onClick={() => { onGrant(u.id, grantAmt[u.id], grantReason[u.id]); setGrantAmt({ ...grantAmt, [u.id]: "" }); }}>지급</button>
                    </div>
                  </td>
                  <td style={{ padding: "10px 12px" }}>
                    <button className="gg-btn-outline" style={{ fontSize: 12, color: u.banned ? COLORS.secondary : COLORS.accent }} onClick={() => onBan(u.id, !u.banned)}>{u.banned ? "정지 해제" : "계정 정지"}</button>
                  </td>

              ))}
            </tbody>
          </table>
        </div>
      )}

      {tab === "materials" && (
        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(220px,1fr))", gap: 12 }}>
          {db.materials.map((m) => (
            <div key={m.id} className="gg-card">
              <div style={{ fontWeight: 800, fontSize: 13.5 }}>{m.title}</div>
              <div style={{ fontSize: 12, color: COLORS.muted, margin: "6px 0" }}>{db.users[m.sellerId]?.nickname} · 신고 {m.reports?.length || 0}건</div>

            </div>
          ))}
        </div>
      )}

      {tab === "posts" && (
        <div className="gg-card" style={{ padding: 0 }}>
          {db.posts.map((p, i) => (
            <div key={p.id} style={{ padding: "12px 16px", display: "flex", justifyContent: "space-between", alignItems: "center", borderBottom: i < db.posts.length - 1 ? `1px solid ${COLORS.border}` : "none" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13.5 }}>{p.title}</div>
                <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 3 }}>{p.board} · {db.users[p.authorId]?.nickname}</div>
              </div>
              <button className="gg-btn-outline" style={{ fontSize: 12, color: COLORS.accent }} onClick={() => { if (confirm("삭제할까요?")) onDeletePost(p.id); }}><Trash2 size={12} /></button>
            </div>
          ))}
        </div>
      )}

      {tab === "notices" && (
        <div>
          <div className="gg-card" style={{ marginBottom: 16 }}>
            <Field label="공지 제목"><input className="gg-input" value={noticeForm.title} onChange={(e) => setNoticeForm({ ...noticeForm, title: e.target.value })} /></Field>
            <Field label="공지 내용"><textarea className="gg-input" rows={2} value={noticeForm.content} onChange={(e) => setNoticeForm({ ...noticeForm, content: e.target.value })} /></Field>
            <button className="gg-btn" onClick={() => { onAddNotice(noticeForm.title, noticeForm.content); setNoticeForm({ title: "", content: "" }); }}>공지 등록</button>
          </div>
          {db.notices.map((n) => (
            <div key={n.id} className="gg-card" style={{ marginBottom: 10, display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
              <div><div style={{ fontWeight: 800, fontSize: 13.5 }}>{n.title}</div><div style={{ fontSize: 12.5, color: COLORS.muted, marginTop: 4 }}>{n.content}</div></div>
              <button className="gg-icon-btn" onClick={() => onDeleteNotice(n.id)}><Trash2 size={14} /></button>
            </div>
          ))}
        </div>
      )}

      {tab === "reports" && (
        <div className="gg-card" style={{ padding: 0 }}>
          {db.reports.length === 0 ? <div style={{ padding: 20 }}><EmptyState text="신고 내역이 없어요." /></div> : db.reports.slice().reverse().map((r, i) => (
            <div key={r.id} style={{ padding: "12px 16px", borderBottom: i < db.reports.length - 1 ? `1px solid ${COLORS.border}` : "none", display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <div>
                <div style={{ fontWeight: 700, fontSize: 13 }}>{r.type} 신고 · {r.reason}</div>
                <div style={{ fontSize: 11.5, color: COLORS.muted, marginTop: 3 }}>신고자: {db.users[r.reporterId]?.nickname} · {fmtDate(r.date)}</div>
              </div>
              <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                <Badge color={r.status === "대기" ? COLORS.accent : COLORS.secondary}>{r.status}</Badge>

                  <>
                    <button className="gg-btn-outline" style={{ fontSize: 11 }} onClick={() => onResolveReport(r.id, "처리완료")}>처리완료</button>
                    <button className="gg-btn-outline" style={{ fontSize: 11 }} onClick={() => onResolveReport(r.id, "반려")}>반려</button>
                  </>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
